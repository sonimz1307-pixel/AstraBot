<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AstraBot • Админка Промптов</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;font-family:Arial, sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;}
.container{max-width:900px;margin:auto;padding:20px;}
h1{margin-bottom:18px;}
.block{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:18px;}
input,textarea,select{width:100%;padding:10px;margin-top:8px;margin-bottom:15px;border-radius:8px;border:none;background:#0f172a;color:#fff;box-sizing:border-box;}
button{padding:10px 15px;border:none;border-radius:8px;background:#f59e0b;color:#000;font-weight:bold;cursor:pointer;}
button:hover{opacity:.9;}
.status{margin-top:10px;font-size:14px;white-space:pre-wrap;}
.success{color:#22c55e;}
.error{color:#ef4444;}
.muted{color:#94a3b8;font-size:12px;}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#0b1220;color:#cbd5e1;font-size:12px;border:1px solid rgba(148,163,184,.2)}
</style>
</head>
<body>
<div class="container">

<div class="row" style="justify-content:space-between;">
  <h1 style="margin:0;">📚 Админка Промптов</h1>
  <div class="pill" id="init_badge">Telegram WebApp: ?</div>
</div>
<div class="muted" id="debug_info" style="margin:10px 0 18px;"></div>

<div class="block">
  <h2 style="margin-top:0;">Проверка доступа</h2>
  <div class="row">
    <button type="button" onclick="checkMe()">Проверить /me</button>
    <button type="button" onclick="showInitLen()">Показать длину initData</button>
  </div>
  <div id="me_status" class="status"></div>
</div>

<div class="block">
  <h2 style="margin-top:0;">Создать подборку</h2>
  <select id="group_category">
    <option value="photo">Фото</option>
    <option value="video">Видео</option>
    <option value="ai">ИИ</option>
  </select>

  <input id="group_title" placeholder="Название подборки" />
  <input id="group_cover" placeholder="URL обложки (необязательно)" />

  <button type="button" onclick="createGroup()">Создать подборку</button>
  <div id="group_status" class="status"></div>
</div>

<div class="block">
  <h2 style="margin-top:0;">Создать промпт</h2>

  <input id="item_group_id" placeholder="ID подборки (UUID)" />
  <input id="item_title" placeholder="Название промпта" />
  <textarea id="item_prompt" rows="6" placeholder="Текст промпта"></textarea>
  <input type="file" id="item_preview" />

  <button type="button" onclick="createItem()">Добавить промпт</button>
  <div id="item_status" class="status"></div>
</div>

</div>

<script>
const tg = window.Telegram?.WebApp;

function qs(name){
  try { return new URLSearchParams(location.search).get(name) || ""; }
  catch(e){ return ""; }
}

const ADMIN_TOKEN_FROM_URL = qs('admin_token'); // опционально (если решишь добавить в URL только для админов)

function getInitData(){
  try {
    return (tg && typeof tg.initData === 'string') ? tg.initData : "";
  } catch(e){
    return "";
  }
}

function buildHeaders(){
  const h = {};
  const init = getInitData();
  if (init) h["X-TG-INITDATA"] = init;
  if (ADMIN_TOKEN_FROM_URL) h["X-ADMIN-TOKEN"] = ADMIN_TOKEN_FROM_URL;
  return h;
}

function setStatus(el, cls, text){
  el.className = "status" + (cls ? (" " + cls) : "");
  el.innerText = text;
}

function showInitLen(){
  const el = document.getElementById('me_status');
  const len = (getInitData() || "").length;
  setStatus(el, len>0 ? "success" : "error", "initData length = " + len);
}

async function checkMe(){
  const el = document.getElementById('me_status');
  setStatus(el, "", "Проверка...\n");
  try{
    const res = await fetch('/api/prompts_admin/me', { headers: buildHeaders() });
    const text = await res.text();
    let json = null;
    try{ json = JSON.parse(text); }catch(e){}
    if(res.ok){
      setStatus(el, "success", "✅ OK\n" + (json ? JSON.stringify(json, null, 2) : text));
    }else{
      setStatus(el, "error", `❌ HTTP ${res.status}\n` + (json ? JSON.stringify(json, null, 2) : text));
    }
  }catch(e){
    setStatus(el, "error", "❌ Ошибка сети: " + (e?.message || String(e)));
  }
}

async function createGroup(){
  const status = document.getElementById('group_status');
  setStatus(status, "", "Создание...");

  const formData = new FormData();
  formData.append('category_slug', document.getElementById('group_category').value);
  formData.append('title', document.getElementById('group_title').value);
  formData.append('cover_url', document.getElementById('group_cover').value);

  try{
    const res = await fetch('/api/prompts_admin/create_group', { method:'POST', headers: buildHeaders(), body: formData });
    const text = await res.text();
    let data=null; try{data=JSON.parse(text);}catch(e){}

    if(res.ok && data && data.ok){
      setStatus(status, 'success', '✅ Создано. ID: ' + (data.item?.id || '')); 
    } else {
      const detail = (data && (data.detail || data.error)) ? (data.detail || data.error) : text;
      setStatus(status, 'error', `❌ HTTP ${res.status}: ` + detail);
    }
  }catch(e){
    setStatus(status, 'error', '❌ Ошибка сети: ' + (e?.message || String(e)));
  }
}

async function createItem(){
  const status = document.getElementById('item_status');
  setStatus(status, "", "Загрузка...");

  const formData = new FormData();
  formData.append('group_id', document.getElementById('item_group_id').value);
  formData.append('title', document.getElementById('item_title').value);
  formData.append('prompt_text', document.getElementById('item_prompt').value);

  const file = document.getElementById('item_preview').files[0];
  if(file) formData.append('preview', file);

  try{
    const res = await fetch('/api/prompts_admin/create_item', { method:'POST', headers: buildHeaders(), body: formData });
    const text = await res.text();
    let data=null; try{data=JSON.parse(text);}catch(e){}

    if(res.ok && data && data.ok){
      setStatus(status, 'success', '✅ Промпт добавлен. ID: ' + (data.item?.id || ''));
    } else {
      const detail = (data && (data.detail || data.error)) ? (data.detail || data.error) : text;
      setStatus(status, 'error', `❌ HTTP ${res.status}: ` + detail);
    }
  }catch(e){
    setStatus(status, 'error', '❌ Ошибка сети: ' + (e?.message || String(e)));
  }
}

(function init(){
  // Важно: на Desktop initData иногда появляется только после ready().
  try{
    if(tg){
      tg.ready();
      tg.expand();
    }
  }catch(e){}

  const badge = document.getElementById('init_badge');
  const dbg = document.getElementById('debug_info');

  const p = (tg && tg.platform) ? tg.platform : 'unknown';
  const v = (tg && tg.version) ? tg.version : 'unknown';

  // Дадим Telegram 200мс на инициализацию
  setTimeout(()=>{
    const len = (getInitData() || '').length;
    badge.innerText = `Telegram WebApp: ${len>0 ? 'ok' : 'initData len=0'}`;
    dbg.innerText = `platform=${p}  version=${v}  initData.length=${len}`;
  }, 200);
})();
</script>
</body>
</html>
