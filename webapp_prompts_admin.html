<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraBot • Админка Промптов</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --card:#1e293b;
      --field:#0b1220;
      --text:#ffffff;
      --muted:#94a3b8;
      --ok:#22c55e;
      --err:#ef4444;
      --accent:#f59e0b;
    }
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
    }
    .container{
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
    }
    h1{margin: 6px 0 18px; font-size: 24px;}
    h2{margin: 0 0 12px; font-size: 18px;}
    .block{
      background: rgba(30,41,59,.92);
      border: 1px solid rgba(148,163,184,.18);
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,.18);
    }
    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media(max-width:760px){
      .row{grid-template-columns: 1fr;}
    }
    input, textarea, select{
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,.18);
      background: var(--field);
      color: var(--text);
      outline: none;
      box-sizing: border-box;
    }
    textarea{resize: vertical;}
    label{display:block; font-size: 12px; color: var(--muted); margin-top: 8px;}
    button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary{
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(148,163,184,.25);
      font-weight: 600;
    }
    button:disabled{opacity:.6; cursor:not-allowed;}
    .status{
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .status.ok{color: var(--ok);}
    .status.err{color: var(--err);}
    .hint{
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .pill{
      font-size: 12px;
      color: var(--muted);
      border: 1px solid rgba(148,163,184,.18);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>📚 Админка промптов</h1>
      <div class="pill" id="tg_info">Telegram WebApp: ...</div>
    </div>

    <div class="block">
      <h2>Проверка доступа</h2>
      <div class="row">
        <div>
          <button class="secondary" onclick="checkMe()">Проверить /me</button>
          <div class="hint">Если тут 401 — значит initData не доезжает или не проходит подпись.</div>
        </div>
        <div>
          <button class="secondary" onclick="copyInitDataLen()">Показать длину initData</button>
          <div class="hint">Длина должна быть &gt; 0, если открыто из кнопки в боте.</div>
        </div>
      </div>
      <div id="me_status" class="status"></div>
    </div>

    <div class="block">
      <h2>Создать подборку</h2>

      <label for="group_category">Категория</label>
      <select id="group_category">
        <option value="photo">Фото</option>
        <option value="video">Видео</option>
        <option value="ai">ИИ</option>
      </select>

      <label for="group_title">Название подборки</label>
      <input id="group_title" placeholder="Например: Anime" />

      <label for="group_cover">URL обложки (необязательно)</label>
      <input id="group_cover" placeholder="https://..." />

      <button id="btn_create_group" onclick="createGroup()">Создать подборку</button>
      <div id="group_status" class="status"></div>
    </div>

    <div class="block">
      <h2>Создать промпт</h2>

      <label for="item_group_id">ID подборки (UUID)</label>
      <input id="item_group_id" placeholder="Например: 6b8f... (UUID)" />

      <label for="item_title">Название промпта</label>
      <input id="item_title" placeholder="Например: Cyberpunk portrait" />

      <label for="item_prompt">Текст промпта</label>
      <textarea id="item_prompt" rows="6" placeholder="Опиши промпт..."></textarea>

      <label for="item_preview">Превью (png/jpg/webp, необязательно)</label>
      <input type="file" id="item_preview" accept=".png,.jpg,.jpeg,.webp" />

      <button id="btn_create_item" onclick="createItem()">Добавить промпт</button>
      <div id="item_status" class="status"></div>
    </div>

    <div class="hint">@NeiroAstraBot</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    function _setStatus(el, text, kind){
      el.className = "status" + (kind ? (" " + kind) : "");
      el.innerText = text || "";
    }

    function getInitData(){
      if(!tg) return "";
      return tg.initData || "";
    }

    function _extractErr(data){
      if(!data) return "no response";
      return data.error || data.detail || data.message || JSON.stringify(data);
    }

    async function _readJsonSafe(res){
      try{
        return await res.json();
      }catch(e){
        const t = await res.text().catch(()=> "");
        return { error: "bad json", detail: t || String(e) };
      }
    }

    // Init Telegram
    (function init(){
      if(!tg){
        document.getElementById("tg_info").innerText = "Telegram WebApp: not detected";
        return;
      }
      try{
        tg.ready();     // ключевой фикс: гарантирует корректную инициализацию
      }catch(e){}
      try{ tg.expand(); }catch(e){}
      const len = (tg.initData || "").length;
      document.getElementById("tg_info").innerText = "Telegram WebApp: ok • initData len=" + len;
    })();

    async function checkMe(){
      const st = document.getElementById("me_status");
      _setStatus(st, "Проверяю...", "");

      const initData = getInitData();
      const res = await fetch("/api/prompts_admin/me", {
        method: "GET",
        headers: { "X-TG-INITDATA": initData }
      });

      const data = await _readJsonSafe(res);

      if(res.ok && data && data.ok){
        _setStatus(st, "✅ Доступ есть. user=" + JSON.stringify(data.user || {}), "ok");
      }else{
        _setStatus(st, "❌ /me: " + res.status + " • " + _extractErr(data), "err");
      }
    }

    function copyInitDataLen(){
      const st = document.getElementById("me_status");
      const len = (getInitData() || "").length;
      _setStatus(st, "initData length = " + len, len > 0 ? "ok" : "err");
    }

    async function createGroup(){
      const btn = document.getElementById("btn_create_group");
      const status = document.getElementById("group_status");
      btn.disabled = true;
      _setStatus(status, "Создание...", "");

      const formData = new FormData();
      formData.append("category_slug", document.getElementById("group_category").value);
      formData.append("title", (document.getElementById("group_title").value || "").trim());
      const cover = (document.getElementById("group_cover").value || "").trim();
      if(cover) formData.append("cover_url", cover);

      const res = await fetch("/api/prompts_admin/create_group",{
        method:"POST",
        headers:{ "X-TG-INITDATA": getInitData() },
        body: formData
      });

      const data = await _readJsonSafe(res);

      if(res.ok && data && data.ok){
        _setStatus(status, "✅ Создано. ID: " + (data.item && data.item.id ? data.item.id : "(no id)"), "ok");
      }else{
        _setStatus(status, "❌ " + res.status + " • " + _extractErr(data), "err");
      }
      btn.disabled = false;
    }

    async function createItem(){
      const btn = document.getElementById("btn_create_item");
      const status = document.getElementById("item_status");
      btn.disabled = true;
      _setStatus(status, "Загрузка...", "");

      const formData = new FormData();
      formData.append("group_id", (document.getElementById("item_group_id").value || "").trim());
      formData.append("title", (document.getElementById("item_title").value || "").trim());
      formData.append("prompt_text", (document.getElementById("item_prompt").value || "").trim());

      const file = document.getElementById("item_preview").files[0];
      if(file) formData.append("preview", file);

      const res = await fetch("/api/prompts_admin/create_item",{
        method:"POST",
        headers:{ "X-TG-INITDATA": getInitData() },
        body: formData
      });

      const data = await _readJsonSafe(res);

      if(res.ok && data && data.ok){
        _setStatus(status, "✅ Промпт добавлен. ID: " + (data.item && data.item.id ? data.item.id : "(no id)"), "ok");
      }else{
        _setStatus(status, "❌ " + res.status + " • " + _extractErr(data), "err");
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
