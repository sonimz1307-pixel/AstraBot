<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraBot Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar panel">
      <div class="brand">
        <div class="brand-mark">A</div>
        <div>
          <div class="brand-title">AstraBot Workspace</div>
          <div class="brand-subtitle">Unified AI operating system</div>
        </div>
      </div>

      <nav class="studio-nav" id="studioNav"></nav>

      <div class="soft-panel recent-card">
        <div class="card-head">
          <strong>Последние действия</strong>
          <button id="clearRunsBtn" class="link-btn">очистить</button>
        </div>
        <div id="recentRuns" class="recent-list empty-state">Пока пусто</div>
      </div>

      <div class="account-card soft-panel">
        <div class="card-head">
          <strong>Подключение</strong>
          <span id="apiStatus" class="badge muted">offline</span>
        </div>
        <label class="label">Telegram User ID</label>
        <div class="inline-row">
          <input id="telegramUserId" type="number" placeholder="например 123456789">
          <button id="saveSettingsBtn" class="btn ghost">Сохранить</button>
        </div>
        <label class="label">API Base URL</label>
        <input id="apiBaseUrl" type="text" placeholder="https://astrabot-tchj.onrender.com">
        <div class="actions two-up compact-gap">
          <button id="checkApiBtn" class="btn secondary">Проверить API</button>
          <button id="loadBalanceBtn" class="btn primary">Баланс</button>
        </div>
        <div class="balance-block">
          <small>Баланс</small>
          <strong id="balanceValue">—</strong>
          <span id="balanceHint">подключи backend-роут workspace</span>
        </div>
      </div>
    </aside>

    <main class="stage">
      <header class="topbar panel">
        <div>
          <div class="eyebrow" id="headerEyebrow">Creative AI studio</div>
          <h1 id="headerTitle">ChatGPT Studio</h1>
          <p id="headerSubtitle">Единая рабочая зона: диалоги, генерации, планы, файлы и история.</p>
        </div>
        <div class="topbar-actions">
          <button id="seedDemoBtn" class="btn ghost">Demo</button>
          <button id="globalRunBtn" class="btn primary">Запустить</button>
        </div>
      </header>

      <section class="workspace-shell panel">
        <div class="workspace-topline">
          <div class="workspace-meta">
            <span class="meta-pill" id="metaStudio">Studio</span>
            <span class="meta-pill" id="metaProvider">Provider</span>
            <span class="meta-pill" id="metaModel">Model</span>
          </div>
          <div class="workspace-meta-right">
            <span class="meta-pill subtle" id="metaMode">Mode</span>
          </div>
        </div>

        <div id="workspaceBody" class="workspace-body"></div>
      </section>
    </main>

    <aside class="inspector panel">
      <div class="inspector-head">
        <div>
          <small class="eyebrow">Inspector</small>
          <h2>Параметры</h2>
        </div>
        <button id="resetStudioBtn" class="btn ghost small">Reset</button>
      </div>
      <div id="inspectorBody" class="inspector-body"></div>
    </aside>
  </div>

  <div id="toastStack" class="toast-stack"></div>
  <script src="./app.js"></script>
</body>
</html>
